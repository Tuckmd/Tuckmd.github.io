<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a1a; display: flex; flex-direction: column; align-items: center; font-family: monospace; user-select: none; }
#fi-hud { display: flex; justify-content: space-between; width: 600px; max-width: 100vw; padding: 6px 8px; font-size: 13px; color: #888; }
#fi-canvas { display: block; cursor: pointer; max-width: 100vw; }
#fi-btns { display: flex; gap: 12px; margin-top: 8px; }
#fi-btns button {
  padding: 10px 28px; font-family: monospace; font-size: 14px; font-weight: bold;
  border-radius: 6px; border: 2px solid; cursor: pointer; transition: background 0.08s, box-shadow 0.08s;
  background: #0a0a1a;
}
#btn-up   { color: #44ff88; border-color: #44ff88; }
#btn-up.active   { background: #44ff88; color: #000; box-shadow: 0 0 20px #44ff88; }
#btn-down { color: #ff4466; border-color: #ff4466; }
#btn-down.active { background: #ff4466; color: #fff; box-shadow: 0 0 20px #ff4466; }
#fi-hint { font-size: 11px; color: #555; margin-top: 6px; text-align: center; max-width: 600px; }
</style>
</head>
<body>
<div id="fi-hud">
  <span id="fi-score">Flight Time: 0.000 ms</span>
  <span id="fi-best">Best: 0.000 ms</span>
  <span id="fi-state">Press Q / P or tap to start</span>
</div>
<canvas id="fi-canvas" width="600" height="400"></canvas>
<div id="fi-btns">
  <button id="btn-up">Q &uarr; Bottom plate</button>
  <button id="btn-down">P &darr; Top plate</button>
</div>
<div id="fi-hint">Hold Q = bottom plate pushes ion up &nbsp;|&nbsp; Hold P = top plate pushes ion down &nbsp;|&nbsp; Reach 20ms to detect!</div>

<script>
const canvas = document.getElementById('fi-canvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 400;

// Ion species definitions — color/shape only, no labels
const ION_SPECIES = [
  // 0: Protonated [M+H]+ — cyan sphere (classic)
  { name:'protonated',
    draw: function(x,y,r,frame) {
      const glow=ctx.createRadialGradient(x,y,0,x,y,r*3);
      glow.addColorStop(0,'rgba(0,255,200,0.35)'); glow.addColorStop(1,'rgba(0,255,200,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*3,0,Math.PI*2); ctx.fill();
      const ig=ctx.createRadialGradient(x-3,y-3,1,x,y,r);
      ig.addColorStop(0,'#ffffff'); ig.addColorStop(0.4,'#00ffcc'); ig.addColorStop(1,'#006644');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    },
    trailColor:'0,255,200'
  },
  // 1: Radical cation — orange-red spiky
  { name:'radical',
    draw: function(x,y,r,frame) {
      const glow=ctx.createRadialGradient(x,y,0,x,y,r*3);
      glow.addColorStop(0,'rgba(255,120,0,0.35)'); glow.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*3,0,Math.PI*2); ctx.fill();
      // Spiky shape — star polygon
      const spikes=7, rot=frame*0.04;
      ctx.beginPath();
      for (let i=0;i<spikes*2;i++) {
        const angle=rot+(i*Math.PI/spikes);
        const rad=i%2===0?r:r*0.55;
        const px=x+Math.cos(angle)*rad, py=y+Math.sin(angle)*rad;
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
      }
      ctx.closePath();
      const ig=ctx.createRadialGradient(x-2,y-2,1,x,y,r);
      ig.addColorStop(0,'#ffeeaa'); ig.addColorStop(0.5,'#ff6600'); ig.addColorStop(1,'#aa1100');
      ctx.fillStyle=ig; ctx.fill();
    },
    trailColor:'255,100,0'
  },
  // 2: Doubly charged — blue-purple double ring
  { name:'doubly_charged',
    draw: function(x,y,r,frame) {
      const glow=ctx.createRadialGradient(x,y,0,x,y,r*3.2);
      glow.addColorStop(0,'rgba(120,80,255,0.35)'); glow.addColorStop(1,'rgba(80,40,220,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*3.2,0,Math.PI*2); ctx.fill();
      // Outer ring
      ctx.strokeStyle='rgba(160,120,255,0.7)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x,y,r+3,0,Math.PI*2); ctx.stroke();
      const ig=ctx.createRadialGradient(x-3,y-3,1,x,y,r);
      ig.addColorStop(0,'#ffffff'); ig.addColorStop(0.4,'#aa66ff'); ig.addColorStop(1,'#330066');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      // Inner bright core
      ctx.fillStyle='rgba(220,200,255,0.5)';
      ctx.beginPath(); ctx.arc(x-2,y-2,r*0.35,0,Math.PI*2); ctx.fill();
    },
    trailColor:'140,80,255'
  },
  // 3: Adduct — golden, slightly oblate
  { name:'adduct',
    draw: function(x,y,r,frame) {
      const glow=ctx.createRadialGradient(x,y,0,x,y,r*3);
      glow.addColorStop(0,'rgba(255,210,0,0.35)'); glow.addColorStop(1,'rgba(255,160,0,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*3,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.translate(x,y); ctx.scale(1.25,0.8); // oblate
      const ig=ctx.createRadialGradient(-3,-3,1,0,0,r);
      ig.addColorStop(0,'#fffaaa'); ig.addColorStop(0.5,'#ffcc00'); ig.addColorStop(1,'#886600');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    },
    trailColor:'255,200,0'
  },
  // 4: Deprotonated — cool teal/blue, inverted shading
  { name:'deprotonated',
    draw: function(x,y,r,frame) {
      const glow=ctx.createRadialGradient(x,y,0,x,y,r*3);
      glow.addColorStop(0,'rgba(0,180,255,0.35)'); glow.addColorStop(1,'rgba(0,100,200,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*3,0,Math.PI*2); ctx.fill();
      const ig=ctx.createRadialGradient(x+3,y+3,1,x,y,r); // highlight bottom-right
      ig.addColorStop(0,'#003366'); ig.addColorStop(0.5,'#0088dd'); ig.addColorStop(1,'#aaeeff');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(180,240,255,0.6)';
      ctx.beginPath(); ctx.arc(x+3,y+3,r*0.3,0,Math.PI*2); ctx.fill();
    },
    trailColor:'0,160,255'
  },
  // 5: Cluster — two small lobes
  { name:'cluster',
    draw: function(x,y,r,frame) {
      const angle=frame*0.05;
      const d=r*0.6;
      const x1=x+Math.cos(angle)*d, y1=y+Math.sin(angle)*d;
      const x2=x+Math.cos(angle+Math.PI)*d, y2=y+Math.sin(angle+Math.PI)*d;
      // Glow
      const glow=ctx.createRadialGradient(x,y,0,x,y,r*3.5);
      glow.addColorStop(0,'rgba(0,255,120,0.3)'); glow.addColorStop(1,'rgba(0,200,80,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*3.5,0,Math.PI*2); ctx.fill();
      // Lobe 1
      const ig1=ctx.createRadialGradient(x1-2,y1-2,1,x1,y1,r*0.75);
      ig1.addColorStop(0,'#ccffdd'); ig1.addColorStop(0.5,'#00cc66'); ig1.addColorStop(1,'#004422');
      ctx.fillStyle=ig1; ctx.beginPath(); ctx.arc(x1,y1,r*0.75,0,Math.PI*2); ctx.fill();
      // Lobe 2
      const ig2=ctx.createRadialGradient(x2-2,y2-2,1,x2,y2,r*0.75);
      ig2.addColorStop(0,'#ccffdd'); ig2.addColorStop(0.5,'#00aa44'); ig2.addColorStop(1,'#003311');
      ctx.fillStyle=ig2; ctx.beginPath(); ctx.arc(x2,y2,r*0.75,0,Math.PI*2); ctx.fill();
      // Bond
      ctx.strokeStyle='rgba(0,200,80,0.4)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    },
    trailColor:'0,220,100'
  },
];

const TOP_COLOR='#cc2244', TOP_GLOW='#ff4466';
const BOT_COLOR='#229944', BOT_GLOW='#44ff88';
const TARGET_MS = 20.0;
const FRAMES_PER_MS = 300; // 5 real seconds per ms = 300 frames at 60fps

let state = 'idle'; // idle, playing, won, dead
let flightFrames = 0, bestMs = 0;
let frame = 0;
let ion, particles, topBar, botBar, otherIons;
let ionSpecies = 0;
const keys = { q: false, p: false };

let specPeaks=[], specOffset=0;
const SPEC_SPEED=1.6;
let segOffset=0;
const SEG_SPEED=1.4;
let flashTimer=0;

// Win spectrum state
let winSpec=[], winSpecProgress=0;

function generatePeaks() {
  specPeaks=[];
  for (let x=0; x<W*4; x+=5+Math.random()*16) {
    const intensity=0.05+Math.random()*0.95;
    specPeaks.push({x,intensity});
    if (Math.random()<0.25) specPeaks.push({x:x+2+Math.random()*3,intensity:intensity*(0.2+Math.random()*0.5)});
  }
}

function generateWinSpectrum() {
  // Realistic-looking generic mass spectrum
  winSpec=[];
  // Base noise
  for (let mz=100; mz<900; mz+=2+Math.floor(Math.random()*4)) {
    const noise=Math.random()*0.08;
    if (noise>0.02) winSpec.push({mz,intensity:noise,type:'noise'});
  }
  // Isotope clusters
  const clusters=[
    {center:184,spacing:1,count:4,base:0.3},
    {center:264,spacing:1,count:5,base:0.7},
    {center:391,spacing:1,count:4,base:0.55},
    {center:496,spacing:1,count:6,base:0.85},
    {center:551,spacing:1,count:3,base:0.45},
    {center:623,spacing:1,count:5,base:0.6},
    {center:744,spacing:1,count:7,base:0.95}, // base peak
    {center:812,spacing:1,count:4,base:0.4},
  ];
  clusters.forEach(function(cl) {
    for (let i=0;i<cl.count;i++) {
      const iso=i===0?1:i===1?0.65:i===2?0.28:i===3?0.12:0.05;
      winSpec.push({mz:cl.center+i*cl.spacing, intensity:cl.base*iso*(0.9+Math.random()*0.2), type:'peak'});
    }
  });
  winSpec.sort(function(a,b){return a.mz-b.mz;});
}

function ionColor(radius) {
  const t=Math.max(0,Math.min(1,(radius-3)/47));
  const hue=Math.round(t*270);
  return {h:hue,s:85+Math.round((1-t)*15),l:55+Math.round(t*15),str:'hsl('+hue+','+(85+Math.round((1-t)*15))+'%,'+(55+Math.round(t*15))+'%)'};
}

function spawnOtherIon(safeTop,safeBot) {
  const large=Math.random()<0.35;
  const radius=large?15+Math.random()*35:3+Math.random()*8;
  const speed=large?0.4+Math.random()*0.8:1.8+Math.random()*3.0;
  const startX=-radius-Math.random()*80;
  const startY=safeTop+radius+Math.random()*(safeBot-safeTop-radius*2);
  const vy=large?(Math.random()-0.5)*0.4:(Math.random()-0.5)*0.15;
  return {x:startX,y:startY,vx:speed,vy,radius,color:ionColor(radius),alive:true};
}

function reset() {
  const safeTop=90,safeBot=H-90;
  const midY=(safeTop+safeBot)/2;
  const range=(safeBot-safeTop)*0.30;
  const startVY=(Math.random()<0.5?1:-1)*(0.8+Math.random()*1.2);
  ion={x:W*0.42,y:midY+(Math.random()-0.5)*range,vy:startVY,radius:10,trail:[]};
  topBar={thickness:40,power:0.0,flash:0};
  botBar={thickness:40,power:0.0,flash:0};
  particles=[]; otherIons=[];
  flightFrames=0; frame=0; flashTimer=0;
  specOffset=0; segOffset=0;
  winSpec=[]; winSpecProgress=0;
  // Pick random species for this run
  ionSpecies=Math.floor(Math.random()*ION_SPECIES.length);
  generatePeaks();
}

// Physics
const MAX_POWER=1.0;
const POWER_UP_RATE=0.045;
const POWER_DECAY_RATE=0.055;
const MAX_PUSH=0.28;       // max force when plate at full power
const DIST_GRAV_MIN=0.02;  // passive pull when far
const DIST_GRAV_MAX=0.12;  // passive pull when near
const MAX_VY=7.0;
const DAMPING=0.991;

function pushFromPower(p) { return p*MAX_PUSH; }

function passiveGrav(ionY,topEdge,botEdge) {
  const safeH=botEdge-topEdge;
  const relY=(ionY-topEdge)/safeH;
  const topDist=Math.max(relY,0.01);
  const botDist=Math.max(1-relY,0.01);
  const topP=DIST_GRAV_MIN+(DIST_GRAV_MAX-DIST_GRAV_MIN)*(1-Math.min(topDist*2.5,1));
  const botP=DIST_GRAV_MIN+(DIST_GRAV_MAX-DIST_GRAV_MIN)*(1-Math.min(botDist*2.5,1));
  return {top:topP,bot:botP};
}

function flightMs() { return flightFrames/FRAMES_PER_MS; }

function update() {
  frame++; flightFrames++;
  specOffset=(specOffset+SPEC_SPEED)%(W*4);
  segOffset=(segOffset+SEG_SPEED)%40;
  if (flashTimer>0) flashTimer--;

  // Q = bottom plate pushes UP; P = top plate pushes DOWN
  if (keys.q) { botBar.power=Math.min(MAX_POWER,botBar.power+POWER_UP_RATE); botBar.flash=1; }
  else { botBar.power=Math.max(0,botBar.power-POWER_DECAY_RATE); botBar.flash=Math.max(0,botBar.flash-0.07); }

  if (keys.p) { topBar.power=Math.min(MAX_POWER,topBar.power+POWER_UP_RATE); topBar.flash=1; }
  else { topBar.power=Math.max(0,topBar.power-POWER_DECAY_RATE); topBar.flash=Math.max(0,topBar.flash-0.07); }

  // Bar breathing
  const breatheAmp=Math.min(12+flightMs()*0.8,40);
  const breatheSpeed=0.007+flightMs()*0.00015;
  topBar.thickness=34+breatheAmp*(0.5+0.5*Math.sin(frame*breatheSpeed));
  botBar.thickness=34+breatheAmp*(0.5+0.5*Math.sin(frame*breatheSpeed+Math.PI));

  const topEdge=topBar.thickness, botEdge=H-botBar.thickness;

  // Forces:
  // Q/bottom plate PUSHES UP = negative vy
  // P/top plate PUSHES DOWN = positive vy
  // Passive gravity PULLS toward nearest bar (destabilizing)
  const pushUp  = -pushFromPower(botBar.power); // bottom plate pushes up
  const pushDown=  pushFromPower(topBar.power); // top plate pushes down
  const passive =  passiveGrav(ion.y,topEdge,botEdge);
  const passiveTop=-passive.top; // pulls toward top bar
  const passiveBot= passive.bot; // pulls toward bottom bar

  ion.vy += pushUp + pushDown + passiveTop + passiveBot;

  // Random nudge — doubled chance
  if (Math.random()<0.016) ion.vy+=(Math.random()-0.5)*0.7;

  ion.vy=Math.max(-MAX_VY,Math.min(MAX_VY,ion.vy));
  ion.vy*=DAMPING;
  ion.y+=ion.vy;

  ion.trail.push({x:ion.x,y:ion.y});
  if (ion.trail.length>24) ion.trail.shift();

  // Flight time flash every 1ms
  if (flightFrames%FRAMES_PER_MS===0) {
    flashTimer=18;
  }

  // Spawn other ions
  const spawnChance=0.003+Math.min(flightMs()*0.0014,0.038);
  if (Math.random()<spawnChance) otherIons.push(spawnOtherIon(topEdge+5,botEdge-5));

  otherIons.forEach(function(oi) {
    if (!oi.alive) return;
    oi.x+=oi.vx; oi.y+=oi.vy;

    // Hit bar — disappear
    if (oi.y-oi.radius<=topEdge || oi.y+oi.radius>=botEdge) { oi.alive=false; return; }
    if (oi.x-oi.radius>W) { oi.alive=false; return; }

    // Collision with main ion
    const dx=ion.x-oi.x, dy=ion.y-oi.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const minDist=ion.radius+oi.radius;
    if (dist<minDist&&dist>0) {
      const nx=dx/dist, ny=dy/dist;
      const dvn=(ion.vy-oi.vy)*ny;
      const mM=ion.radius*ion.radius, oM=oi.radius*oi.radius;
      const impulse=(2*oM/(mM+oM))*dvn;
      ion.vy-=impulse*ny*1.4;
      ion.vy=Math.max(-MAX_VY,Math.min(MAX_VY,ion.vy));
      oi.vy+=impulse*ny*0.8; oi.vx+=impulse*nx*0.4;
      const overlap=minDist-dist+1;
      ion.y+=ny*overlap*0.6; oi.y-=ny*overlap*0.4; oi.x-=nx*overlap*0.4;
      for (let i=0;i<8;i++) {
        const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
        particles.push({x:ion.x-nx*ion.radius,y:ion.y-ny*ion.radius,
          vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.06+Math.random()*0.05,
          color:oi.color.str,size:1.5+Math.random()*2.5});
      }
    }
  });

  otherIons=otherIons.filter(function(oi){return oi.alive;});
  particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life-=p.decay;});
  particles=particles.filter(function(p){return p.life>0;});

  // Check win
  if (flightMs()>=TARGET_MS) { win(); return; }

  // Check death
  if (ion.y-ion.radius<=topEdge||ion.y+ion.radius>=botEdge) die();

  updateHUD();
}

function die() {
  state='dead';
  if (flightMs()>bestMs) bestMs=flightMs();
  for (let i=0;i<36;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*5;
    particles.push({x:ion.x,y:ion.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:0.022+Math.random()*0.04,
      color:['#00ffcc','#ffcc00','#ff4466','#ffffff'][Math.floor(Math.random()*4)],
      size:2+Math.random()*4});
  }
}

function win() {
  state='won';
  if (flightMs()>bestMs) bestMs=TARGET_MS;
  generateWinSpectrum();
  winSpecProgress=0;
  for (let i=0;i<50;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*6;
    particles.push({x:ion.x,y:ion.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:0.012+Math.random()*0.025,
      color:['#00ff88','#00ffcc','#ffffff','#aaff00'][Math.floor(Math.random()*4)],
      size:2+Math.random()*5});
  }
}

function updateHUD() {
  const ms=flightMs().toFixed(3);
  const best=bestMs.toFixed(3);
  document.getElementById('fi-score').innerHTML='Flight Time: '+ms+' ms';
  document.getElementById('fi-best').textContent='Best: '+best+' ms';
  document.getElementById('fi-state').textContent=
    state==='playing'?'Q=bottom up | P=top down | Reach 20ms!':
    state==='won'?'ION DETECTED! 20ms reached!':
    state==='dead'?'Not Detected — press Q/P to retry':
    'Press Q / P or tap to start';
}

// ── Draw ──────────────────────────────────────────────────────────────────

function drawBg() {
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a1a'); g.addColorStop(1,'#0d1030');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawSpectrum() {
  if (!specPeaks.length) return;
  const topEdge=topBar.thickness, botEdge=H-botBar.thickness;
  const baseY=botEdge-6, maxPeakH=(botEdge-topEdge)*0.5;
  ctx.save(); ctx.beginPath(); ctx.rect(0,topEdge+2,W,botEdge-topEdge-4); ctx.clip();
  specPeaks.forEach(function(pk) {
    const rawX=pk.x-specOffset;
    const drawX=((rawX%(W*4))+(W*4))%(W*4);
    if (drawX<0||drawX>W) return;
    const peakH=pk.intensity*maxPeakH;
    const alpha=0.09+pk.intensity*0.14;
    ctx.strokeStyle='rgba(0,200,160,'+alpha+')'; ctx.lineWidth=1.1;
    ctx.beginPath(); ctx.moveTo(drawX,baseY); ctx.lineTo(drawX,baseY-peakH); ctx.stroke();
    if (pk.intensity>0.65) { ctx.fillStyle='rgba(0,255,200,'+(alpha*1.5)+')'; ctx.fillRect(drawX-0.5,baseY-peakH-1,1.5,2); }
  });
  ctx.strokeStyle='rgba(0,180,140,0.1)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(0,baseY); ctx.lineTo(W,baseY); ctx.stroke();
  const spacing=80,loff=specOffset%spacing;
  for (let lx=-loff;lx<W+spacing;lx+=spacing) {
    const mz=Math.round((specOffset+lx)/2);
    ctx.fillStyle='rgba(0,180,140,0.2)'; ctx.font='9px monospace'; ctx.fillText(mz,lx+2,baseY+10);
    ctx.strokeStyle='rgba(0,180,140,0.1)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(lx,baseY); ctx.lineTo(lx,baseY+4); ctx.stroke();
  }
  ctx.restore();
}

function drawBar(isTop) {
  const bar=isTop?topBar:botBar;
  const edge=isTop?bar.thickness:H-bar.thickness;
  const y1=isTop?0:edge, y2=isTop?edge:H;
  const flash=bar.flash, pw=bar.power;
  // NOTE: Q controls bottom (BOT_GLOW=green), P controls top (TOP_GLOW=red)
  const glowC=isTop?TOP_GLOW:BOT_GLOW;
  const baseC=isTop?TOP_COLOR:BOT_COLOR;
  const darkC=isTop?'#1a0008':'#001a08';

  const grad=ctx.createLinearGradient(0,y1,0,y2);
  if (isTop){grad.addColorStop(0,darkC);grad.addColorStop(0.75,baseC);grad.addColorStop(1,flash>0.3?glowC:'#ee3355');}
  else{grad.addColorStop(0,flash>0.3?glowC:'#33ee77');grad.addColorStop(0.25,baseC);grad.addColorStop(1,darkC);}
  ctx.fillStyle=grad; ctx.fillRect(0,y1,W,y2-y1);

  const la=0.07+pw*0.08;
  ctx.strokeStyle=isTop?'rgba(255,80,120,'+la+')':'rgba(60,220,110,'+la+')';
  ctx.lineWidth=1;
  for (let ly=y1+5;ly<y2-2;ly+=7){ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();}

  const sa=0.10+pw*0.14+flash*0.1;
  ctx.strokeStyle=isTop?'rgba(255,50,80,'+sa+')':'rgba(40,200,100,'+sa+')';
  ctx.lineWidth=0.9;
  for (let sx=-(segOffset%40);sx<W;sx+=40){ctx.beginPath();ctx.moveTo(sx,y1);ctx.lineTo(sx,y2);ctx.stroke();}

  const pwX=W-90,pwBarH=4,pwY=isTop?edge-15:edge+11;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(pwX,pwY,80,pwBarH);
  ctx.fillStyle=isTop?'rgba(255,68,102,'+(0.4+pw*0.6)+')':'rgba(68,255,136,'+(0.4+pw*0.6)+')';
  ctx.fillRect(pwX,pwY,80*pw,pwBarH);

  if (flash>0||pw>0.5){ctx.shadowColor=glowC;ctx.shadowBlur=12*Math.max(flash,pw-0.3);}
  const ea=0.25+flash*0.55+pw*0.25;
  ctx.fillStyle=isTop?'rgba(255,68,102,'+ea+')':'rgba(68,255,136,'+ea+')';
  if (isTop) ctx.fillRect(0,edge-4,W,4); else ctx.fillRect(0,edge,W,4);
  ctx.shadowBlur=0;

  // Labels reflect new controls: top=P, bottom=Q
  ctx.fillStyle=isTop?'rgba(255,140,160,0.85)':'rgba(100,255,160,0.85)';
  ctx.font='bold 10px monospace';
  if (isTop) ctx.fillText('+V  (P)',10,edge-12); else ctx.fillText('-V  (Q)',10,edge+16);

  ctx.strokeStyle='rgba(120,120,200,0.16)'; ctx.lineWidth=0.5; ctx.setLineDash([4,6]);
  ctx.beginPath(); ctx.moveTo(0,edge); ctx.lineTo(W,edge); ctx.stroke();
  ctx.setLineDash([]);
}

function drawOtherIons() {
  const topEdge=topBar.thickness, botEdge=H-botBar.thickness;
  ctx.save(); ctx.beginPath(); ctx.rect(0,topEdge,W,botEdge-topEdge); ctx.clip();
  otherIons.forEach(function(oi) {
    if (!oi.alive) return;
    const c=oi.color;
    const trailLen=Math.min(8,Math.round(oi.vx*2));
    for (let t=1;t<=trailLen;t++) {
      const frac=t/trailLen;
      ctx.beginPath(); ctx.arc(oi.x-t*oi.vx*0.7,oi.y,Math.max(oi.radius*(1-frac*0.6),0.5),0,Math.PI*2);
      ctx.fillStyle='hsla('+c.h+','+c.s+'%,'+c.l+'%,'+((1-frac)*0.28)+')'; ctx.fill();
    }
    const glow=ctx.createRadialGradient(oi.x,oi.y,0,oi.x,oi.y,oi.radius*2.2);
    glow.addColorStop(0,'hsla('+c.h+','+c.s+'%,'+(c.l+20)+'%,0.28)');
    glow.addColorStop(1,'hsla('+c.h+','+c.s+'%,'+c.l+'%,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(oi.x,oi.y,oi.radius*2.2,0,Math.PI*2); ctx.fill();
    const ig=ctx.createRadialGradient(oi.x-oi.radius*0.3,oi.y-oi.radius*0.3,oi.radius*0.1,oi.x,oi.y,oi.radius);
    ig.addColorStop(0,'hsl('+c.h+',100%,90%)'); ig.addColorStop(0.5,c.str); ig.addColorStop(1,'hsl('+c.h+','+c.s+'%,25%)');
    ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(oi.x,oi.y,oi.radius,0,Math.PI*2); ctx.fill();
    // NO + label
  });
  ctx.restore();
}

function drawIon() {
  if (state==='dead') return;
  const topEdge=topBar.thickness, botEdge=H-botBar.thickness;
  ctx.save(); ctx.beginPath(); ctx.rect(0,topEdge,W,botEdge-topEdge); ctx.clip();

  const sp=ION_SPECIES[ionSpecies];
  const tc=sp.trailColor;

  // Trail
  for (let i=0;i<ion.trail.length;i++) {
    const frac=i/ion.trail.length;
    const t=ion.trail[i];
    const trailX=ion.x-(ion.trail.length-i)*2.2;
    ctx.beginPath(); ctx.arc(trailX,t.y,Math.max(ion.radius*frac*0.68,0.5),0,Math.PI*2);
    ctx.fillStyle='rgba('+tc+','+(frac*0.45)+')'; ctx.fill();
  }
  // Motion blur
  for (let m=1;m<=5;m++) {
    ctx.beginPath(); ctx.arc(ion.x-m*5,ion.y,Math.max(ion.radius*(1-m*0.07),1),0,Math.PI*2);
    ctx.fillStyle='rgba('+tc+','+(0.05*(6-m))+')'; ctx.fill();
  }

  // Score flash
  if (flashTimer>0) {
    const ft=flashTimer/18;
    const fg=ctx.createRadialGradient(ion.x,ion.y,0,ion.x,ion.y,ion.radius*6*ft);
    fg.addColorStop(0,'rgba(255,255,255,'+(ft*0.95)+')');
    fg.addColorStop(0.3,'rgba(220,255,245,'+(ft*0.6)+')');
    fg.addColorStop(0.7,'rgba(0,255,200,'+(ft*0.25)+')');
    fg.addColorStop(1,'rgba(0,255,200,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(ion.x,ion.y,ion.radius*6,0,Math.PI*2); ctx.fill();
  }

  // Draw species
  sp.draw(ion.x,ion.y,ion.radius,frame);

  // Force arrows
  if (state==='playing') {
    // Q=bottom pushes up, P=top pushes down
    const upLen=botBar.power*14, downLen=topBar.power*14;
    ctx.lineWidth=1.5;
    // upward arrow (green, from bottom bar)
    ctx.strokeStyle='rgba(68,255,136,'+Math.min(0.9,botBar.power*0.9+0.1)+')';
    ctx.beginPath(); ctx.moveTo(ion.x,ion.y-ion.radius-3); ctx.lineTo(ion.x,ion.y-ion.radius-3-upLen); ctx.stroke();
    if (upLen>4){ctx.beginPath();ctx.moveTo(ion.x-3,ion.y-ion.radius-upLen+2);ctx.lineTo(ion.x,ion.y-ion.radius-3-upLen);ctx.lineTo(ion.x+3,ion.y-ion.radius-upLen+2);ctx.stroke();}
    // downward arrow (red, from top bar)
    ctx.strokeStyle='rgba(255,68,102,'+Math.min(0.9,topBar.power*0.9+0.1)+')';
    ctx.beginPath(); ctx.moveTo(ion.x,ion.y+ion.radius+3); ctx.lineTo(ion.x,ion.y+ion.radius+3+downLen); ctx.stroke();
    if (downLen>4){ctx.beginPath();ctx.moveTo(ion.x-3,ion.y+ion.radius+downLen+1);ctx.lineTo(ion.x,ion.y+ion.radius+3+downLen);ctx.lineTo(ion.x+3,ion.y+ion.radius+downLen+1);ctx.stroke();}
  }
  ctx.restore();
}

function drawParticles() {
  const topEdge=topBar.thickness, botEdge=H-botBar.thickness;
  ctx.save(); ctx.beginPath(); ctx.rect(0,topEdge,W,botEdge-topEdge); ctx.clip();
  particles.forEach(function(p){
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.restore();
}

function drawProgressBar() {
  if (state!=='playing') return;
  const ms=flightMs();
  const pct=Math.min(ms/TARGET_MS,1);
  const barW=W*0.6, barX=(W-barW)/2, barY=H-14, barH=4;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(barX,barY,barW,barH);
  const pg=ctx.createLinearGradient(barX,0,barX+barW,0);
  pg.addColorStop(0,'#00ffcc'); pg.addColorStop(0.5,'#00aaff'); pg.addColorStop(1,'#00ff88');
  ctx.fillStyle=pg; ctx.fillRect(barX,barY,barW*pct,barH);
  ctx.fillStyle='rgba(0,200,160,0.6)'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText(ms.toFixed(2)+' / 20.00 ms',W/2,barY-3);
  ctx.textAlign='left';
}

function drawWinSpectrum() {
  if (state!=='won') return;
  winSpecProgress=Math.min(winSpecProgress+2,winSpec.length);
  const topEdge=topBar.thickness, botEdge=H-botBar.thickness;
  const baseY=botEdge-10;
  const maxPeakH=(botEdge-topEdge)*0.75;
  const mzMin=100,mzMax=900;

  ctx.save(); ctx.beginPath(); ctx.rect(0,topEdge,W,botEdge-topEdge); ctx.clip();

  // Axes
  ctx.strokeStyle='rgba(0,255,136,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(40,topEdge+10); ctx.lineTo(40,baseY); ctx.lineTo(W-10,baseY); ctx.stroke();
  ctx.fillStyle='rgba(0,255,136,0.6)'; ctx.font='9px monospace';
  ctx.fillText('Intensity',2,topEdge+20);
  ctx.textAlign='center'; ctx.fillText('m/z',W/2,baseY+14); ctx.textAlign='left';

  for (let i=0;i<winSpecProgress;i++) {
    const pk=winSpec[i];
    const x=40+(pk.mz-mzMin)/(mzMax-mzMin)*(W-55);
    const peakH=pk.intensity*maxPeakH;
    const alpha=pk.type==='peak'?0.9:0.3;
    const col=pk.type==='peak'?'rgba(0,255,136,'+alpha+')':'rgba(0,200,120,'+alpha+')';
    ctx.strokeStyle=col; ctx.lineWidth=pk.type==='peak'?1.5:0.8;
    ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x,baseY-peakH); ctx.stroke();
    if (pk.type==='peak'&&pk.intensity>0.4) {
      ctx.fillStyle='rgba(0,255,136,0.7)'; ctx.fillRect(x-0.5,baseY-peakH-1,2,2);
    }
  }
  ctx.restore();
}

function drawScore() {
  if (state!=='playing') return;
  const ms=flightMs().toFixed(3);
  ctx.fillStyle='rgba(0,255,200,0.9)'; ctx.font='bold 20px monospace';
  ctx.textAlign='center'; ctx.fillText(ms+' ms',W/2,30); ctx.textAlign='left';
}

function drawOverlay() {
  if (state==='idle') {
    ctx.fillStyle='rgba(0,0,20,0.70)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#00ffcc'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
    ctx.fillText('ION Runner',W/2,H/2-90);
    ctx.font='13px monospace'; ctx.fillStyle='#aaaaff';
    ctx.fillText('You are an ion between two charged plates.',W/2,H/2-54);
    ctx.fillText('You control the plates — not the ion.',W/2,H/2-32);
    ctx.font='bold 13px monospace'; ctx.fillStyle='#44ff88';
    ctx.fillText('Hold Q = bottom plate pushes ion UP',W/2,H/2-4);
    ctx.fillStyle='#ff4466';
    ctx.fillText('Hold P = top plate pushes ion DOWN',W/2,H/2+18);
    ctx.font='12px monospace'; ctx.fillStyle='#ffcc44';
    ctx.fillText('Watch out for other ions!',W/2,H/2+44);
    ctx.fillStyle='#555';
    ctx.fillText('Plates decay when not held. Reach 20ms to detect!',W/2,H/2+62);
    ctx.fillStyle='#888'; ctx.fillText('Press Q, P, or tap to begin',W/2,H/2+84);
    ctx.textAlign='left';
  }
  if (state==='dead') {
    ctx.fillStyle='rgba(0,0,20,0.74)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444'; ctx.font='bold 30px monospace'; ctx.textAlign='center';
    ctx.fillText('NOT DETECTED',W/2,H/2-55);
    ctx.fillStyle='#aaaaff'; ctx.font='15px monospace';
    ctx.fillText('Flight Time: '+flightMs().toFixed(3)+' ms',W/2,H/2-14);
    ctx.fillText('Best: '+bestMs.toFixed(3)+' ms',W/2,H/2+12);
    ctx.fillStyle='#00ffcc'; ctx.font='13px monospace';
    ctx.fillText('Press Q, P, or tap to retry',W/2,H/2+50);
    ctx.textAlign='left';
  }
  if (state==='won') {
    // Dim overlay — spectrum shows through
    ctx.fillStyle='rgba(0,0,20,0.55)'; ctx.fillRect(0,0,W,topBar.thickness);
    ctx.fillStyle='rgba(0,0,20,0.55)'; ctx.fillRect(0,H-botBar.thickness,W,botBar.thickness);
    // Big green ION DETECTED
    ctx.fillStyle='rgba(0,20,10,0.6)'; ctx.fillRect(0,0,W,60);
    ctx.fillStyle='#00ff88'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
    ctx.shadowColor='#00ff88'; ctx.shadowBlur=20;
    ctx.fillText('ION DETECTED',W/2,38);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,255,136,0.7)'; ctx.font='13px monospace';
    ctx.fillText('20.000 ms — full flight time achieved!',W/2,56);
    // Bottom bar
    ctx.fillStyle='rgba(0,20,10,0.7)'; ctx.fillRect(0,H-38,W,38);
    ctx.fillStyle='#aaffcc'; ctx.font='12px monospace';
    ctx.fillText('Best: '+bestMs.toFixed(3)+' ms  |  Press Q/P to play again',W/2,H-14);
    ctx.textAlign='left';
  }
}

function setButtonActive(id,active) {
  const btn=document.getElementById(id);
  if (active) btn.classList.add('active'); else btn.classList.remove('active');
}

function loop() {
  if (state==='playing') update();
  if (state==='won') {
    winSpecProgress=Math.min(winSpecProgress+2,winSpec.length);
    specOffset=(specOffset+SPEC_SPEED)%(W*4);
    segOffset=(segOffset+SEG_SPEED)%40;
    particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life-=p.decay;});
    particles=particles.filter(function(p){return p.life>0;});
  }
  drawBg();
  if (state!=='won') drawSpectrum();
  drawBar(true); drawBar(false);
  if (state==='won') drawWinSpectrum();
  else drawOtherIons();
  drawIon(); drawParticles();
  drawProgressBar(); drawScore(); drawOverlay();
  setButtonActive('btn-up',keys.q);
  setButtonActive('btn-down',keys.p);
  requestAnimationFrame(loop);
}

function startGame(){reset();state='playing';}
function handleStart(){if(state==='idle'||state==='dead'||state==='won') startGame();}

document.addEventListener('keydown',function(e){
  if(e.key==='q'||e.key==='Q'){e.preventDefault();keys.q=true;handleStart();}
  if(e.key==='p'||e.key==='P'){e.preventDefault();keys.p=true;handleStart();}
});
document.addEventListener('keyup',function(e){
  if(e.key==='q'||e.key==='Q') keys.q=false;
  if(e.key==='p'||e.key==='P') keys.p=false;
});
canvas.addEventListener('mousedown',function(e){
  const rect=canvas.getBoundingClientRect();
  const y=(e.clientY-rect.top)*(H/rect.height);
  if(y<H/2) keys.q=true; else keys.p=true;
  handleStart();
});
canvas.addEventListener('mouseup',function(){keys.q=false;keys.p=false;});
canvas.addEventListener('mouseleave',function(){keys.q=false;keys.p=false;});
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  Array.from(e.changedTouches).forEach(function(t){
    const rect=canvas.getBoundingClientRect();
    const y=(t.clientY-rect.top)*(H/rect.height);
    if(y<H/2) keys.q=true; else keys.p=true;
  });
  handleStart();
},{passive:false});
canvas.addEventListener('touchend',function(e){e.preventDefault();keys.q=false;keys.p=false;},{passive:false});

function bindBtn(id,key){
  const btn=document.getElementById(id);
  btn.addEventListener('mousedown',function(){keys[key]=true;handleStart();});
  btn.addEventListener('mouseup',function(){keys[key]=false;});
  btn.addEventListener('mouseleave',function(){keys[key]=false;});
  btn.addEventListener('touchstart',function(e){e.preventDefault();keys[key]=true;handleStart();},{passive:false});
  btn.addEventListener('touchend',function(e){e.preventDefault();keys[key]=false;},{passive:false});
}
bindBtn('btn-up','q'); bindBtn('btn-down','p');

// Init
ion={x:W*0.42,y:H/2,vy:0,radius:10,trail:[]};
particles=[]; otherIons=[];
topBar={thickness:40,power:0.0,flash:0};
botBar={thickness:40,power:0.0,flash:0};
generatePeaks(); loop();
</script>
</body>
